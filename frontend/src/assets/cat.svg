<svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 480 360">
  <g transform="translate(120, 20) scale(0.8)">
    <!-- Main Body and Head -->
    <path fill="#FFAB19" stroke="#000000" stroke-width="5" d="M 240,110
        c 30,-50 90,-50 120,0
        l 0,30
        c 0,20 -10,30 -20,40
        l -10,10
        c -10,10 -20,20 -20,30
        l 0,50
        c 0,30 -20,50 -40,50
        s -40,-20 -40,-50
        l 0,-50
        c 0,-10 -10,-20 -20,-30
        l -10,-10
        c -10,-10 -20,-20 -20,-40
        l 0,-30
        z" />

    <!-- Ears -->
    <path fill="#FFAB19" stroke="#000000" stroke-width="5" d="M 245,110
        l -30,-40
        c -10,-10 0,-30 15,-30
        s 25,20 15,30
        z" />
    <path fill="#FFAB19" stroke="#000000" stroke-width="5" d="M 355,110
        l 30,-40
        c 10,-10 0,-30 -15,-30
        s -25,20 -15,30
        z" />

    <!-- Face Details -->
    <path fill="#FFFFFF" stroke="#000000" stroke-width="5" d="M 260,180
        c 20,20 80,20 100,0
        c 10,-20 -10,-40 -50,-40
        s -60,20 -50,40
        z" />
    <circle cx="285" cy="145" r="15" fill="#000000" />
    <circle cx="282" cy="142" r="5" fill="#FFFFFF" />
    <circle cx="315" cy="145" r="15" fill="#000000" />
    <circle cx="312" cy="142" r="5" fill="#FFFFFF" />
    <path d="M 300,160
        l -5,10
        l 10,0
        z" fill="#000000" />
    <path d="M 280,185
        c 10,15 30,15 40,0" fill="none" stroke="#000000" stroke-width="5" stroke-linecap="round"/>

    <!-- Whiskers -->
    <path d="M 250,165 l -20,-5" stroke="#000000" stroke-width="3" stroke-linecap="round"/>
    <path d="M 250,175 l -25,0" stroke="#000000" stroke-width="3" stroke-linecap="round"/>
    <path d="M 250,185 l -20,5" stroke="#000000" stroke-width="3" stroke-linecap="round"/>
    <path d="M 350,165 l 20,-5" stroke="#000000" stroke-width="3" stroke-linecap="round"/>
    <path d="M 350,175 l 25,0" stroke="#000000" stroke-width="3" stroke-linecap="round"/>
    <path d="M 350,185 l 20,5" stroke="#000000" stroke-width="3" stroke-linecap="round"/>

    <!-- Belly Patch -->
    <ellipse cx="300" cy="240" rx="25" ry="30" fill="#FFFFFF" stroke="#000000" stroke-width="5" />

    <!-- Limbs -->
    <path fill="#FFAB19" stroke="#000000" stroke-width="5" stroke-linejoin="round" d="M 340,220
        c 20,-20 50,-10 60,10
        s 10,50 -10,60
        s -40,-10 -50,-20
        z"/>
    <path fill="#FFAB19" stroke="#000000" stroke-width="5" stroke-linejoin="round" d="M 260,220
        c 0,20 -20,30 -30,30
        s -20,-20 -10,-30
        c 10,-10 20,-10 30,0
        l 10,0
        z"/>
    <path fill="#FFAB19" stroke="#000000" stroke-width="5" d="M 270,280
        l -10,30
        c -5,20 20,30 30,10
        l 10,-40
        z" />
    <path fill="#FFAB19" stroke="#000000" stroke-width="5" d="M 330,280
        l 10,30
        c 5,20 -20,30 -30,10
        l -10,-40
        z" />

    <!-- Tail -->
    <path fill="#FFAB19" stroke="#000000" stroke-width="5" d="M 230,260
        c -40,0 -50,40 -20,50
        s 50,-10 50,-30
        s -10,-20 -30,-20
        z" />
    <path fill="#FFFFFF" stroke="#000000" stroke-width="5" d="M 230,260
        c -20,0 -25,20 -5,25
        s 20,-5 5,-25
        z"/>
  </g>
</svg>
